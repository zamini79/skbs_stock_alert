name: 주가 변동 감지 (SK바이오사이언스 302440)

# 평일 장중(KST 09:00~15:30) 5분 간격 실행 + 수동 실행 지원.
# GitHub Actions cron 은 UTC 기준이므로 KST(=UTC+9)에서 9시간을 뺀 0~6시(UTC)로 지정.
# ⚠️ GitHub 무료 cron 은 짧은 주기를 보장하지 못함(부하 시 5분+ 간격/누락). 정확한 주기가 필요하면 클라우드 cron 필요.
on:
  schedule:
    - cron: "*/5 0-5 * * 1-5"   # UTC 00:00~05:55 = KST 09:00~14:55, 5분 간격, 월~금
    - cron: "0-30/5 6 * * 1-5"  # UTC 06:00~06:30 = KST 15:00~15:30, 5분 간격, 월~금
  workflow_dispatch:             # Actions 탭에서 수동 실행(테스트용)

# 동시 실행 방지: 이전 실행이 끝나기 전 새 실행이 겹치지 않도록.
concurrency:
  group: stock-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      # 발송 쿨다운(하루 최대 2회·단계별 1회) 상태 파일을 실행 간 보존.
      # ⚠️ actions/cache 키는 immutable(한 번 생기면 갱신 안 됨)이라, 고정 키를 쓰면
      #    같은 날 보고를 보내도 상태가 저장되지 않아 다음 실행이 중복 발송한다(실측).
      #    → 매 실행 '고유 키'로 새로 저장하고, restore-keys 접두사로 '오늘 최신' 상태를 복원한다.
      - name: 오늘 날짜(KST) 산출
        id: date
        run: echo "today=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: 보고 상태 파일 캐시 (매 실행 새 키 저장 + 오늘 최신 복원)
        uses: actions/cache@v4
        with:
          path: ~/.stock_alert_302440_state.json
          key: stock-alert-state-${{ steps.date.outputs.today }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-alert-state-${{ steps.date.outputs.today }}-

      - name: 주가 감지 → (조건 충족 시) 보고
        env:
          TZ: Asia/Seoul   # 로그 시각·날짜(date.today)를 KST로 — 캐시 키와 동일 기준
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_CORP_CODE: ${{ secrets.DART_CORP_CODE }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 stock_alert_302440.py
